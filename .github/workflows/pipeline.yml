name: CI/CD Pipeline App Tarefas

on:
  push:
    branches: [ "main", "joaoPedro" ] 
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: TESTES (Ajustado para Front e Back) ---
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4
      
      - name: Instalar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Instalar Dependências da Raiz
        run: npm install
        
      - name: Instalar Dependências do Frontend
        run: |
          cd frontend
          npm install

      - name: Rodar Testes do Backend
        run: npm test -- --json --outputFile=test-report-backend.json
        
      - name: Validar Compilação do Frontend
        run: |
          cd frontend
          npx ng build --configuration production
        
      - name: Salvar Relatório como Artefato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-de-testes
          path: test-report-backend.json

  # --- JOB 2: BUILD / EMPACOTAMENTO (Mantido e ajustado) ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4
        
      - name: Empacotar o Projeto (Build)
        # Incluímos a pasta frontend no zip para o deploy ser completo
        run: zip -r pacote-deploy.zip backend/ frontend/ package.json
        
      - name: Salvar Pacote (Build) como Artefato
        uses: actions/upload-artifact@v4
        with:
          name: pacote-aplicacao
          path: pacote-deploy.zip

  # --- JOB 3: DEPLOY (Mantido igual) ---
  deploy:
    needs: [test, build] 
    runs-on: ubuntu-latest
    steps:
      - name: Acionar Deploy no Render
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "A URL do Render ainda não foi configurada. Pulando."
          else
            curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
          fi

  # --- JOB 4: NOTIFICAÇÃO (Mantido e corrigido) ---
  notify:
    needs: [test, build, deploy]
    if: always() 
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4
        
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Executar Script de Notificação
        # Injetamos as Secrets na variável de ambiente do arquivo
        env:
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          SENHA_REMETENTE: ${{ secrets.SENHA_REMETENTE }}
          EMAIL_DESTINO: ${{ secrets.EMAIL }}
          STATUS_PIPELINE: ${{ job.status }}
        run: node script-notificacao.js